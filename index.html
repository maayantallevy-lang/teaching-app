        html:not(.dark) .shadow-inner { box-shadow: inset 0 2px 4px rgba(0,0,0,0.06) !important; }

        /* === DARK MODE === */

        .swal2-popup { font-family: 'Heebo', sans-serif !important; border-radius: 2.5rem !important; padding: 2rem !important; }
        html.dark .swal2-popup { background: rgba(15,23,42,0.95) !important; color: #f8fafc !important; border: 1px solid rgba(255,255,255,0.1); }
        input::placeholder { color: #94a3b8; font-weight: 500; }

        /* === Premium Effects === */
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-15px) rotate(1deg); } }
        @keyframes mesh { 
            0% { background-position: 0% 50%; } 
            50% { background-position: 100% 50%; } 
            100% { background-position: 0% 50%; } 
        }
        @keyframes shine { 
            0% { background-position: -200% center; } 
            100% { background-position: 200% center; } 
        }
        @keyframes sweep { 
            0% { transform: translateX(-200%) skewX(-15deg); } 
            100% { transform: translateX(300%) skewX(-15deg); } 
        }

        .animate-float { animation: float 6s ease-in-out infinite; }
        .bg-mesh { 
            background: linear-gradient(-45deg, #020617, #1e1b4b, #0f172a, #020617);
            background-size: 400% 400%;
            animation: mesh 15s ease infinite;
        }
        .btn-sweep { position: relative; overflow: hidden; }
        .btn-sweep::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
            transform: skewX(-15deg); transition: 0.7s;
        }
        .btn-sweep:hover::after { animation: sweep 0.8s forwards; }

        .metallic-outline {
            box-shadow:

            background-clip: text;
            -webkit-text-fill-color: transparent;

    const MapModal = ({ onClose, onSelect, initialLat, initialLng, t, lang }) => {
        const { useRef, useState, useEffect } = React;
        const mapRef = useRef(null);
        const markerRef = useRef(null);
        const [localName, setLocalName] = useState('');
        
        useEffect(() => {
            if (!window.L) return;
            const map = L.map('map-container').setView([initialLat||31.768, initialLng||35.213], initialLat?16:8);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OSM'
            }).addTo(map);
            
            if (initialLat && initialLng) {
                markerRef.current = L.marker([initialLat, initialLng]).addTo(map);
            }

            map.on('click', async (e) => {
                const { lat, lng } = e.latlng;
                if (markerRef.current) map.removeLayer(markerRef.current);
                markerRef.current = L.marker([lat, lng]).addTo(map);
                
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=${lang}`);
                    const data = await res.json();
                    setLocalName(data.display_name);
                    onSelect(lat, lng, data.display_name);
                } catch(err) {
                    const fb = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
                    setLocalName(fb);
                    onSelect(lat, lng, fb);
                }
            });
            mapRef.current = map;
            return () => map.remove();
        }, []);

        const goToLoc = () => {
            if (!navigator.geolocation) return Swal.fire('Error', 'No GPS support', 'error');
            navigator.geolocation.getCurrentPosition((pos) => {
                const { latitude:lat, longitude:lng } = pos.coords;
                if(mapRef.current) {
                     mapRef.current.setView([lat, lng], 16);
                     if (markerRef.current) mapRef.current.removeLayer(markerRef.current);
                     markerRef.current = L.marker([lat, lng]).addTo(mapRef.current);
                     fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=${lang}`)
                        .then(r=>r.json()).then(d=>{ setLocalName(d.display_name); onSelect(lat,lng,d.display_name); })
                        .catch(()=>{ const fb=`${lat.toFixed(4)}, ${lng.toFixed(4)}`; setLocalName(fb); onSelect(lat,lng,fb); });
                }
            }, () => Swal.fire('Error', 'Could not get location. Check permissions.', 'error'));
        };

        return (
            <div className="fixed inset-0 z-[100] bg-slate-900/80 backdrop-blur-md flex flex-col items-center justify-center p-4">
                <div className="bg-white dark:bg-slate-900 w-full max-w-lg rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col relative h-[70vh]">
                    <div className="p-4 bg-prime-500 text-white font-black text-center text-lg">{t.tAddress||'Address'}</div>
                    <div id="map-container" className="w-full grow z-0 relative" style={{background:'#e5e7eb'}}></div>
                    <button onClick={goToLoc} className="absolute bottom-24 right-4 z-[400] bg-white text-prime-600 p-4 rounded-full shadow-2xl hover:scale-110 transition-all border border-slate-200">
                        <svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v4m0 8v4m8-8h-4M4 12h4m4-8a8 8 0 110 16 8 8 0 010-16z" /></svg>
                    </button>
                    <div className="p-4 bg-slate-50 dark:bg-slate-800 space-y-3 z-10">
                        <div className="text-sm font-bold text-slate-600 dark:text-slate-300 min-h-[1.5rem] text-center line-clamp-2">{localName || ''}</div>
                        <button onClick={onClose} className="btn-metallic w-full py-4 rounded-[2rem] font-black">{t.save||'Save'}</button>
                    </div>
                </div>
            </div>
        );
    };

        // Haversine formula
        const haversine = (lat1, lon1, lat2, lon2) => {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        };

        // Teachers in range (ignoring filters) — used to build filter options
        const inRangeTeachers = useMemo(() => {
            if (!studentPos) return [];
            return allTeachers.filter(tea => {
                const dist = haversine(studentPos.lat, studentPos.lng, tea.lat, tea.lng);
                return dist <= (tea.serviceRadius || 10);
            });
        }, [allTeachers, studentPos]);

        // Apply active filters on top of in-range set
        const visibleTeachers = useMemo(() => {
            return inRangeTeachers.filter(tea => {
                const matchesSub = !filters.subject || tea.subjects.includes(filters.subject);
                const matchesPrice = tea.rate <= filters.maxPrice;
                const matchesLevel = !filters.level || (tea.levels || []).includes(filters.level);
                return matchesSub && matchesPrice && matchesLevel;
            });
        }, [inRangeTeachers, filters]);

        // Subjects only from in-range teachers
        const availableSubjects = useMemo(() => [...new Set(inRangeTeachers.flatMap(t => t.subjects))], [inRangeTeachers]);

        // Standard predefined levels
        const staticLevels = ['יסודי', 'חטיבה', 'תיכון', 'בגרות 3 יחידות', 'בגרות 4 יחידות', 'בגרות 5 יחידות', 'אוניברסיטה'];

        // Max price among in-range teachers
        const maxPossiblePrice = useMemo(() => Math.max(300, ...inRangeTeachers.map(t => t.rate || 0)), [inRangeTeachers]);

        // Count active filters
        const activeFilterCount = [filters.subject, filters.level, filters.maxPrice < maxPossiblePrice].filter(Boolean).length;

        const openFilterPopup = () => { setDraft({ ...filters }); setShowFilterPopup(true); };
        const applyFilters = () => { setFilters({ ...draft }); setShowFilterPopup(false); };
        const clearFilters = () => { const reset = { subject: '', maxPrice: maxPossiblePrice, level: '' }; setDraft(reset); setFilters(reset); setShowFilterPopup(false); };

        // Initialize map
        useEffect(() => {
            const map = L.map('market-map', { zoomControl: false }).setView([32.0853, 34.7818], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
            mapRef.current = map;
            setTimeout(() => map.invalidateSize(), 100);
            return () => map.remove();
        }, []);

        // Handle location picking on map click (when in 'picking' mode)
        useEffect(() => {
            if (!mapRef.current) return;
            if (locationStage === 'picking') {
                const handler = (e) => {
                    const { lat, lng } = e.latlng;
                    setStudentPos({ lat, lng });
                    setLocationStage('ready');
                };
                mapRef.current.on('click', handler);
                return () => mapRef.current?.off('click', handler);
            }
        }, [locationStage]);

        // Update student marker when position changes
        useEffect(() => {
            if (!mapRef.current || !studentPos) return;
            if (studentMarkerRef.current) mapRef.current.removeLayer(studentMarkerRef.current);
            const studentIcon = L.divIcon({
                className: 'custom-div-icon',
                html: `<div style="width:20px;height:20px;background:#3b82f6;border:3px solid white;border-radius:50%;box-shadow:0 0 0 4px rgba(59,130,246,0.3);"></div>`,
                iconSize: [20, 20], iconAnchor: [10, 10]
            });
            studentMarkerRef.current = L.marker([studentPos.lat, studentPos.lng], { icon: studentIcon, zIndexOffset: 1000 }).addTo(mapRef.current);
            mapRef.current.setView([studentPos.lat, studentPos.lng], 13);
        }, [studentPos]);

        // Update teacher markers (no radius circles)
        useEffect(() => {
            if (!mapRef.current) return;
            teacherMarkersRef.current.forEach(m => mapRef.current.removeLayer(m));
            teacherMarkersRef.current = [];

            visibleTeachers.forEach(tea => {
                const initials = (tea.name || '?')[0];
                const icon = L.divIcon({
                    className: 'custom-div-icon',
                    html: `<div style="position:relative;width:56px;height:62px;">
                               <div style="width:56px;height:56px;border-radius:50%;border:3px solid white;box-shadow:0 4px 20px rgba(0,0,0,0.25);overflow:hidden;background:#e2e8f0;display:flex;align-items:center;justify-content:center;">
                                   ${tea.img ? `<img src="${tea.img}" style="width:100%;height:100%;object-fit:cover;">` : `<span style="color:#7c3aed;font-weight:900;font-size:20px;">${initials}</span>`}
                               </div>
                               <div style="position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:8px solid white;"></div>
                           </div>`,
                    iconSize: [56, 62], iconAnchor: [28, 62]
                });
                const marker = L.marker([tea.lat, tea.lng], { icon }).on('click', () => setSelLoc(tea));
                marker.addTo(mapRef.current);
                teacherMarkersRef.current.push(marker);
            });
        }, [visibleTeachers]);

        // Auto-request GPS on mount
        useEffect(() => {
            if (!navigator.geolocation) { setLocationStage('denied'); return; }
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    setStudentPos({ lat: pos.coords.latitude, lng: pos.coords.longitude });
                    setLocationStage('ready');
                },
                () => { setLocationStage('denied'); }
            );
        }, []);

        const triggerAd = (teacherId, field) => {
            setAd({ id: teacherId, field, time: 3 });
            let timer = 3;
            const int = setInterval(() => {
                timer--;
                if (timer <= 0) {
                    clearInterval(int);
                    setReveal(r => ({ ...r, [`${teacherId}_${field}`]: true }));
                    setAd(null);
                } else {
                    setAd(prev => prev ? { ...prev, time: timer } : null);
                }
            }, 1000);
        };

        return (
            <div className="fixed inset-0 bg-slate-50 dark:bg-slate-950 flex flex-col z-[50]">
                {/* Header */}
                <div className="flex justify-between items-center px-5 py-4 sticky top-0 z-[100] safe-pt bg-slate-950/80 backdrop-blur-xl border-b border-white/5">
                    <div className="flex items-center gap-3">
                        <button onClick={() => setStage('role_selection')} className="p-3 rounded-full bg-white/5 text-white hover:bg-white/10 transition-all"><I.Back /></button>
                        <span className="font-extrabold text-xl tracking-tighter text-white">{t.market}</span>
                    </div>
                    <div className="flex items-center gap-2">
                        {/* Change location */}
                        <button onClick={() => setLocationStage('picking')} title="שנה מיקום חיפוש" className="p-2.5 rounded-2xl bg-white/5 border border-white/10 text-slate-400 hover:text-white hover:bg-white/10 transition-all">
                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        </button>
                        {/* Filters */}
                        <button onClick={openFilterPopup} className={`flex items-center gap-2 px-4 py-2 rounded-2xl text-xs font-black transition-all border ${activeFilterCount > 0 ? 'bg-prime-500/20 border-prime-500/50 text-prime-400' : 'bg-white/5 border-white/10 text-slate-400 hover:text-white'}`}>
                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 4h18M7 8h10M11 12h2M9 16h6"/></svg>
                            פילטרים {activeFilterCount > 0 && <span className="bg-prime-500 text-white w-4 h-4 rounded-full text-[9px] flex items-center justify-center">{activeFilterCount}</span>}
                        </button>
                        <div className="bg-prime-500/10 border border-prime-500/30 text-prime-400 px-3 py-1.5 rounded-full text-[9px] font-black tracking-widest uppercase">{visibleTeachers.length} מורים</div>
                    </div>
                </div>


                {/* Map */}
                <div className="relative flex-1">
                    <div id="market-map" className="w-full h-full z-0"></div>

                    {/* Location Permission Overlay (denied) */}
                    {locationStage === 'denied' && (
                        <div className="absolute inset-0 z-40 bg-slate-950/90 backdrop-blur-sm flex flex-col items-center justify-center p-8 gap-6">
                            <div className="w-20 h-20 rounded-[2rem] bg-orange-500/10 border border-orange-500/30 flex items-center justify-center">
                                <svg className="w-10 h-10 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                            </div>
                            <div className="text-center">
                                <h2 className="text-2xl font-black text-white mb-2">נדרשת גישה למיקום</h2>
                                <p className="text-slate-400 font-medium text-sm leading-relaxed">הגישה לGPS נדחתה. סמן את המיקום שלך ידנית על המפה כדי לגלות מורים בסביבה.</p>
                            </div>
                            <button onClick={() => setLocationStage('picking')} className="btn-metallic text-white px-10 py-5 rounded-[2.5rem] font-black text-lg shadow-2xl active:scale-95 transition-transform flex items-center gap-3">
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                בחר מיקום על המפה
                            </button>
                        </div>
                    )}

                    {/* Requesting GPS overlay */}
                    {locationStage === 'requesting' && (
                        <div className="absolute inset-0 z-40 bg-slate-950/80 backdrop-blur-sm flex flex-col items-center justify-center gap-4">
                            <div className="w-16 h-16 rounded-full border-4 border-prime-500/30 border-t-prime-500 animate-spin"></div>
                            <p className="text-slate-400 font-black text-sm uppercase tracking-widest">מאתר מיקום...</p>
                        </div>
                    )}

                    {/* Picking mode hint */}
                    {locationStage === 'picking' && (
                        <div className="absolute top-4 left-1/2 -translate-x-1/2 z-40 bg-prime-600 text-white px-6 py-3 rounded-2xl shadow-2xl font-black text-sm text-center">
                            📍 לחץ על המפה לסימון המיקום שלך
                        </div>
                    )}

                    {/* Ready - GPS re-center button */}
                    {(locationStage === 'ready' || locationStage === 'picking') && studentPos && (
                        <button
                            onClick={() => mapRef.current?.setView([studentPos.lat, studentPos.lng], 13)}
                            className="absolute bottom-28 right-4 z-30 bg-white dark:bg-slate-800 text-prime-600 dark:text-prime-400 p-3 rounded-full shadow-xl hover:scale-110 transition-all border border-slate-200 dark:border-white/10"
                        >
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v4m0 8v4m8-8h-4M4 12h4m4-8a8 8 0 110 16 8 8 0 010-16z"/></svg>
                        </button>
                    )}

                    {/* No results message */}
                    {locationStage === 'ready' && visibleTeachers.length === 0 && inRangeTeachers.length > 0 && (
                        <div className="absolute bottom-24 left-1/2 -translate-x-1/2 z-30 bg-slate-900/95 backdrop-blur-xl text-white px-6 py-4 rounded-2xl shadow-2xl text-center border border-white/10">
                            <p className="font-black text-sm mb-1">אין מורים התואמים לפילטרים</p>
                            <button onClick={clearFilters} className="text-prime-400 text-xs font-black mt-1 hover:underline">נקה פילטרים</button>
                        </div>
                    )}
                    {locationStage === 'ready' && inRangeTeachers.length === 0 && (
                        <div className="absolute bottom-24 left-1/2 -translate-x-1/2 z-30 bg-slate-900/95 backdrop-blur-xl text-white px-6 py-4 rounded-2xl shadow-2xl text-center border border-white/10">
                            <p className="font-black text-sm mb-1">לא נמצאו מורים בסביבה</p>
                            <p className="text-slate-400 text-xs font-medium">נסה לשנות את המיקום</p>
                        </div>
                    )}

                    {/* AdMob Banner */}
                    <div className="absolute bottom-4 left-1/2 -translate-x-1/2 z-30">
                        <div className="bg-white/95 dark:bg-slate-900/95 backdrop-blur-xl border border-black/10 dark:border-white/10 w-[320px] h-[50px] flex items-center justify-center shadow-2xl relative overflow-hidden group rounded-sm">
                            <div className="absolute top-0 left-0 bg-slate-700 text-[6px] text-white/70 px-1 py-0.5 font-black">AD</div>
                            <div className="absolute inset-0 flex items-center px-3 gap-3 cursor-pointer">
                                <div className="w-9 h-9 bg-red-600 rounded-lg flex items-center justify-center text-white text-[10px] font-black shadow-lg shrink-0">🍕</div>
                                <div className="flex-1 min-w-0">
                                    <div className="text-[10px] font-black text-slate-800 dark:text-white leading-none mb-0.5 text-right truncate">מזמינים פיצה? קבלו 10% הנחה!</div>
                                    <div className="text-[8px] font-bold text-slate-500 text-right">הורידו את Pizza Hut עכשיו</div>
                                </div>
                                <div className="bg-red-600 text-[8px] text-white px-2 py-1 rounded font-black shrink-0">התקן</div>
                            </div>
                        </div>
                    </div>
                </div>

                {/* Filter Popup (Bottom Sheet Modal) */}
                {showFilterPopup && (
                    <div className="fixed inset-0 z-[250] flex items-end justify-center bg-slate-900/60 backdrop-blur-sm" onClick={() => setShowFilterPopup(false)}>
                        <div className="w-full max-w-lg bg-slate-900 rounded-t-[2.5rem] border-t border-white/10 shadow-2xl overflow-hidden" onClick={e => e.stopPropagation()}>
                            {/* Handle */}
                            <div className="h-1 w-12 bg-slate-600 rounded-full mx-auto mt-3"></div>

                            <div className="px-6 pt-4 pb-2 flex items-center justify-between">
                                <h3 className="font-black text-xl text-white tracking-tight">סינון מורים</h3>
                                {activeFilterCount > 0 && (
                                    <button onClick={clearFilters} className="text-[11px] font-black text-red-400 bg-red-500/10 border border-red-500/20 px-3 py-1 rounded-full hover:bg-red-500/20 transition-all">
                                        נקה הכל
                                    </button>
                                )}
                            </div>

                            <div className="px-6 pb-8 space-y-7 overflow-y-auto max-h-[70vh] hide-scrollbar">

                                {/* Subject filter */}
                                <div className="space-y-3">
                                    <div className="flex items-center gap-2">
                                        <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">מקצוע</span>
                                        {draft.subject && <span className="text-[9px] font-black text-prime-400 bg-prime-500/10 px-2 py-0.5 rounded-full">{draft.subject}</span>}
                                    </div>
                                    {availableSubjects.length > 0 ? (
                                        <div className="flex gap-2 flex-wrap">
                                            {availableSubjects.map(sub => (
                                                <button key={sub}
                                                    onClick={() => setDraft(d => ({ ...d, subject: d.subject === sub ? '' : sub }))}
                                                    className={`px-4 py-2 rounded-2xl text-xs font-black transition-all border ${draft.subject === sub ? 'bg-prime-500/30 border-prime-500/60 text-prime-300' : 'bg-white/5 border-white/10 text-slate-400 hover:text-white hover:bg-white/10'}`}>
                                                    {sub}
                                                </button>
                                            ))}
                                        </div>
                                    ) : (
                                        <p className="text-slate-500 text-xs font-bold">אין מורים בסביבה להציג מקצועות</p>
                                    )}
                                </div>

                                {/* Price filter */}
                                <div className="space-y-3">
                                    <div className="flex items-center justify-between">
                                        <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">מחיר מקסימלי לשיעור</span>
                                        <span className="text-prime-400 font-black text-sm">{draft.maxPrice}₪</span>
                                    </div>
                                    <div className="relative">
                                        <input
                                            type="range"
                                            min="50" max={maxPossiblePrice} step="10"
                                            value={draft.maxPrice}
                                            onChange={e => setDraft(d => ({ ...d, maxPrice: Number(e.target.value) }))}
                                            className="w-full h-2 bg-slate-700 rounded-full appearance-none cursor-pointer accent-prime-500"
                                            style={{direction:'ltr'}}
                                        />
                                        <div className="flex justify-between text-[9px] font-bold text-slate-600 mt-1">
                                            <span>50₪</span>
                                            <span>{maxPossiblePrice}₪</span>
                                        </div>
                                    </div>
                                </div>

                                {/* Level filter */}
                                <div className="space-y-3">
                                    <div className="flex items-center gap-2">
                                        <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">רמת לימוד</span>
                                        {draft.level && <span className="text-[9px] font-black text-emerald-400 bg-emerald-500/10 px-2 py-0.5 rounded-full">{draft.level}</span>}
                                    </div>
                                    <div className="flex gap-2 flex-wrap">
                                        {staticLevels.map(lvl => (
                                            <button key={lvl}
                                                onClick={() => setDraft(d => ({ ...d, level: d.level === lvl ? '' : lvl }))}
                                                className={`px-4 py-2 rounded-2xl text-xs font-black transition-all border ${draft.level === lvl ? 'bg-emerald-500/20 border-emerald-500/50 text-emerald-300' : 'bg-white/5 border-white/10 text-slate-400 hover:text-white hover:bg-white/10'}`}>
                                                {lvl}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* Apply button */}
                                <button onClick={applyFilters} className="w-full btn-metallic text-white py-5 rounded-[2.5rem] font-black text-lg shadow-2xl active:scale-95 transition-transform">
                                    החל פילטרים
                                </button>
                            </div>
                        </div>
                    </div>
                )}

                {/* Teacher Card Bottom Sheet */}
                {selLoc && (
                    <div className="fixed inset-0 z-[200] flex items-end justify-center bg-slate-900/50 backdrop-blur-sm" onClick={() => setSelLoc(null)}>
                        <div className="w-full max-w-lg bg-white dark:bg-slate-900 rounded-t-[2.5rem] overflow-hidden shadow-2xl border-t border-white/10" onClick={e => e.stopPropagation()}>
                            <div className="h-1 w-12 bg-slate-300 dark:bg-slate-600 rounded-full mx-auto mt-3 mb-0"></div>
                            <div className="h-24 bg-gradient-to-br from-prime-600 to-prime-800 relative">
                                <button onClick={() => setSelLoc(null)} className="absolute top-4 right-4 p-2 bg-black/20 rounded-full text-white hover:bg-black/40"><I.Back className="rotate-180"/></button>
                                {/* Distance badge */}
                                {studentPos && (
                                    <div className="absolute top-4 left-4 bg-black/20 text-white text-[10px] font-black px-3 py-1 rounded-full">
                                        {haversine(studentPos.lat, studentPos.lng, selLoc.lat, selLoc.lng).toFixed(1)} ק"מ ממיקומך
                                    </div>
                                )}
                            </div>
                            <div className="relative px-6 pb-8 flex flex-col items-center -mt-12">
                                <div className="w-24 h-24 rounded-[1.5rem] border-4 border-white dark:border-slate-900 overflow-hidden shadow-xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center">
                                    {selLoc.img ? <img src={selLoc.img} className="w-full h-full object-cover" /> : <div className="text-3xl text-prime-600 dark:text-prime-400 font-black">{selLoc.name[0]}</div>}
                                </div>
                                <h2 className="mt-3 text-2xl font-black text-slate-800 dark:text-white text-center">{selLoc.name}</h2>
                                <div className="flex flex-wrap gap-2 justify-center mt-2">
                                    {(selLoc.rawSubjects || (selLoc.subjects || []).map(name => ({name}))).map((sub, i) => (
                                        <div key={i} className="bg-prime-50 dark:bg-prime-500/20 text-prime-600 dark:text-prime-400 border border-prime-200 dark:border-prime-500/30 px-3 py-1 rounded-xl flex flex-col items-center">
                                            <span className="text-[11px] font-black uppercase tracking-wide leading-none">{sub.name}</span>
                                            {sub.level && <span className="text-[9px] font-bold opacity-80 mt-1 leading-none">{sub.level}</span>}
                                        </div>
                                    ))}
                                </div>
                                <p className="mt-3 text-center text-slate-500 dark:text-slate-400 text-sm leading-relaxed">{selLoc.bio}</p>
                                <div className="mt-4 grid grid-cols-2 gap-3 px-2 w-full max-w-sm mx-auto text-center">
                                    <button onClick={() => !reveal[`${selLoc.id}_pRate`] && triggerAd(selLoc.id, 'pRate')} className={`group relative bg-slate-100 dark:bg-slate-800/80 border border-black/5 dark:border-white/10 rounded-3xl py-4 flex flex-col items-center justify-center transition-all ${!reveal[`${selLoc.id}_pRate`] ? 'hover:border-prime-500/50 hover:scale-105 cursor-pointer shadow-xl' : 'cursor-default'}`}>
                                        <div className="flex items-center justify-center gap-1 text-prime-600 dark:text-prime-400 font-black text-2xl tracking-widest leading-none">
                                            {reveal[`${selLoc.id}_pRate`] ? `${selLoc.rate}` : '***'}<span className="text-lg">₪</span>
                                        </div>
                                        <div className="text-slate-400 text-[10px] font-bold uppercase tracking-wide mt-1.5">{t.pRate || 'שיעור פרטי'}</div>
                                        {!reveal[`${selLoc.id}_pRate`] && <div className="absolute -top-3 left-1/2 -translate-x-1/2 bg-gradient-to-r from-prime-500 to-indigo-500 text-white text-[9px] font-bold px-3 py-1 rounded-full shadow-lg group-hover:scale-105 transition-all border border-white/20 whitespace-nowrap text-center z-10 w-max">צפה בפרסומת למחיר פרטי</div>}
                                    </button>

                                    <button onClick={() => !reveal[`${selLoc.id}_gRate`] && triggerAd(selLoc.id, 'gRate')} className={`group relative bg-slate-100 dark:bg-slate-800/80 border border-black/5 dark:border-white/10 rounded-3xl py-4 flex flex-col items-center justify-center transition-all ${!reveal[`${selLoc.id}_gRate`] ? 'hover:border-emerald-500/50 hover:scale-105 cursor-pointer shadow-xl' : 'cursor-default'}`}>
                                        <div className="flex items-center justify-center gap-1 text-emerald-600 dark:text-emerald-400 font-black text-2xl tracking-widest leading-none">
                                            {reveal[`${selLoc.id}_gRate`] ? `${selLoc.groupRate || Math.round(selLoc.rate * 0.75)}` : '***'}<span className="text-lg">₪</span>
                                        </div>

                const lDate = new Date(l.date);
                if(lDate.getMonth() === now.getMonth() && lDate.getFullYear() === now.getFullYear()) {
                    return acc + (l.students || []).length * l.rate;

                return acc;
            }, 0);

            return { todayCount, thisMonthIncome, totalDebts };

        useEffect(() => {

                        const allPaid = (l.students || []).every(s => s.paid);

                        <div class="flex flex-col gap-1"><label class="text-[10px] uppercase font-black text-gray-400">${t.date}</label><input id="ed" type="date" class="swal2-input !m-0 !w-full" value="${l.date}"></div>

                <div className="p-8 flex-1 flex flex-col justify-center max-w-md mx-auto w-full">
                    <div className="card-metallic p-12 rounded-[4rem] border-white/10 space-y-12 shadow-[0_0_80px_rgba(0,0,0,0.5)]">
                        <div className="text-center space-y-4">
                            <div className="bg-prime-500/10 text-prime-400 p-6 rounded-[2rem] inline-block mb-2 ring-1 ring-white/10"><I.Hat /></div>
                            <h2 className="text-4xl font-black tracking-tight text-white italic">{t.loginT}</h2>
                            <p className="text-sm font-bold text-slate-500 tracking-wide">{t.loginSub}</p>
                        </div>
                        <div className="space-y-6">
                            <input className="w-full p-6 bg-slate-900/50 rounded-[2.5rem] outline-none border border-white/5 text-white font-black text-base shadow-inner focus:ring-4 ring-prime-500/20 transition-all" placeholder={t.e || 'Email'} />
                            <input className="w-full p-6 bg-slate-900/50 rounded-[2.5rem] outline-none border border-white/5 text-white font-black text-base shadow-inner focus:ring-4 ring-prime-500/20 transition-all" type="password" placeholder={t.p || 'Password'} />
                        </div>
                        <button onClick={()=>setStage('teacher_dashboard')} className="w-full btn-metallic text-white p-7 rounded-[2.5rem] font-black shadow-2xl text-xl active:scale-95 transition-transform">{t.loginB}</button>
                    </div>
                    <p className="text-center mt-12 text-[10px] font-black text-slate-500 uppercase tracking-widest hover:text-white transition-colors cursor-pointer">{t.forgotP} • {t.helpC}</p>
                </div>
            </div>
        );

        return (
            <div className="h-screen flex flex-col bg-slate-950 overflow-hidden leading-snug">
                <Top title="Private Teacher Finder" />
                <div className="flex-1 overflow-y-auto hide-scrollbar">
                    {tab==='register' && <RegTab />}
                    {tab==='billing' && <BillTab />}
                    {tab==='matrix' && <MatTab />}
                    {tab==='settings' && <SetTab key={lang} />}
                </div>
                <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[94%] max-w-lg glass-nav flex justify-around p-5 safe-pb rounded-[3rem] shadow-2xl z-[100]">
                    {[{id:'register',i:<I.Reg/>,l:t.reg},{id:'billing',i:<I.Bill/>,l:t.bill},{id:'matrix',i:<I.Grid/>,l:t.cls},{id:'settings',i:<I.Set/>,l:t.set}].map(x=>(
                        <button key={x.id} onClick={()=>setTab(x.id)} className={`flex flex-col items-center gap-2 transition-all p-2 ${tab===x.id?'text-prime-400 scale-110 font-black':'text-slate-500 hover:text-slate-300'}`}>
                            {x.i} <span className="text-[9px] uppercase tracking-widest leading-none">{x.l}</span>
                        </button>
                    ))}
                </nav>
            </div>
        );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
